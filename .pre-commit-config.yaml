# Golden Pre-Commit Configuration for Petrosa (v3.0)
# Use: copy to .pre-commit-config.yaml in any Petrosa repo

repos:
  # ==================================================================
  # CODE QUALITY - Ruff (Latest v0.9.9)
  # ==================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        name: ⚡ Ruff Linter & Fixer
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ⚡ Ruff Formatter

  # ==================================================================
  # SECURITY - Gitleaks (Official Hook)
  # ==================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: 🔐 Gitleaks (Secret Detection)

  # ==================================================================
  # SECURITY - Bandit (Latest v1.7.8)
  # ==================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: 🔐 Bandit (Python Security)
        # Scan ONLY first-party source dirs. The previous --exclude pattern
        # did not match nested venv paths reliably, so bandit was scanning
        # IPython/etc. inside ./venv and tripping on hundreds of third-party
        # findings. Whitelist-style targeting via -r ta_bot scripts is
        # easier to reason about than blacklist-style excludes.
        args:
          - -ll
          - -r
          - ta_bot
          - scripts
          - -s
          - B608
        pass_filenames: false

  # ==================================================================
  # LINTING - YAML & TOML
  # ==================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: 📋 YAML Linter

  # ==================================================================
  # STANDARD HOOKS
  # ==================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-ast
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  # ==================================================================
  # LOCAL PETROSA HOOKS
  # ==================================================================
  - repo: local
    hooks:
      - id: check-test-assertions
        name: 🧪 Check Test Assertions
        entry: python3 scripts/check-test-assertions.py
        language: system
        types: [python]
        files: ^tests/
