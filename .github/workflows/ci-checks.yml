name: CI Checks

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pipeline:
    name: CI Pipeline
    uses: PetroSa2/petrosa-shared-workflows/.github/workflows/ci-pipeline.yml@main  # yamllint disable-line rule:line-length
    with:
      service-name: 'bot-ta-analysis'
      image-name: 'yurisa2/petrosa-bot-ta-analysis'
      python-version: '3.11'
      skip-docker-build: true
    secrets: inherit
