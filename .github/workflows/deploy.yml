name: Deploy

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      reason:
        description: 'Reason for deployment'
        required: true
        type: string
        default: 'Manual deployment'

env:
  NAMESPACE: petrosa-apps

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    name: Create Release
    runs-on: petrosa-org-runners
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set version
      id: version
      run: |
        # Get latest tag, default to v1.0.0 if no tags exist
        CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
        BASE_VERSION="${CURRENT}"
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        VERSION="${BASE_VERSION}-r${{ github.run_number }}-${SHORT_SHA}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"

    - name: Create tag
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git tag -a "$VERSION" -m "Release $VERSION"
        git push origin "$VERSION"

  build-and-push:
    name: Build & Push
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Determine Version
      id: version
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Using version: ${VERSION}"
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and Push Docker Image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          yurisa2/petrosa-ta-bot:${{ steps.version.outputs.version }}
          yurisa2/petrosa-ta-bot:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ steps.version.outputs.version }}
          COMMIT_SHA=${{ github.sha }}

  gitops-update:
    name: GitOps Update
    needs: [build-and-push, create-release]
    runs-on: petrosa-org-runners
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Generate GitOps Bot Token
        uses: tibdex/github-app-token@v2
        id: generate-token
        with:
          app_id: ${{ secrets.GITOPS_APP_ID }}
          private_key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          installation_retrieval_mode: id
          installation_retrieval_payload: ${{ secrets.GITOPS_APP_INSTALLATION_ID }}

      - name: Checkout petrosa_k8s
        uses: actions/checkout@v4
        with:
          repository: PetroSa2/petrosa_k8s
          ref: main
          token: ${{ steps.generate-token.outputs.token }}
          path: petrosa_k8s

      - name: Rebase on main
        run: ./scripts/gitops-rebase-main.sh
        working-directory: petrosa_k8s

      - name: Validate VERSION_PLACEHOLDER in source k8s manifests
        run: |
          echo "🔍 Checking for VERSION_PLACEHOLDER in source k8s manifests..."
          if grep -rq "VERSION_PLACEHOLDER" k8s/ 2>/dev/null; then
            echo "✅ VERSION_PLACEHOLDER found in source k8s manifests"
          else
            echo "❌ ERROR: VERSION_PLACEHOLDER not found in source k8s manifests!"
            echo "The gitops-update will silently fail if VERSION_PLACEHOLDER is missing."
            echo "Please ensure k8s/ manifests use VERSION_PLACEHOLDER instead of hardcoded versions."
            exit 1
          fi

      - name: Update ta-bot image tag in GitOps manifests
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          # Update the image tag in manifests robustly
          find petrosa_k8s/k8s/bot-ta-analysis -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 | xargs -0 -r sed -E -i "s|(image:[[:space:]]*)([^[:space:]]*/)?(petrosa-ta-bot):[^[:space:]]*|\1\2\3:$VERSION|g"

          # Update version labels specifically
          find petrosa_k8s/k8s/bot-ta-analysis -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 | xargs -0 -r sed -E -i "s/^([[:space:]]*(version|app\.kubernetes\.io\/version)):.*/\1: $VERSION/g"

          echo "Updated ta-bot image tag to $VERSION in petrosa_k8s/k8s/bot-ta-analysis/"

      - name: Commit and push to petrosa_k8s
        working-directory: petrosa_k8s
        run: |
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add k8s/bot-ta-analysis/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "gitops: ta-bot image ${{ needs.build-and-push.outputs.version }}"
            git push origin main
          fi

  notify:
    name: notify
    needs: [build-and-push, gitops-update, create-release]
    runs-on: petrosa-org-runners
    if: always()
    steps:
    - name: Create summary
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"
        if [ "${{ needs.gitops-update.result }}" == "success" ]; then
          echo "✅ Build, Push, and GitOps Update successful!" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ GitOps Update failed!" >> $GITHUB_STEP_SUMMARY
        fi
        echo "📦 Version: ${VERSION}" >> $GITHUB_STEP_SUMMARY
